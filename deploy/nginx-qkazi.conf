# Qkazi nginx reverse proxy.
#
#   sudo cp deploy/nginx-qkazi.conf /etc/nginx/sites-available/qkazi
#   sudo ln -s /etc/nginx/sites-available/qkazi /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d qkazi.example.com    # adds the 443 block + redirect
#
# Replace qkazi.example.com with your domain.

server {
    listen 80;
    server_name qkazi.example.com;

    # Profile photos / ID docs / task images are capped at 5 MB in the app;
    # give the proxy a little headroom.
    client_max_body_size 10M;

    # Server-Sent Events (live offers + chat). These MUST disable buffering
    # and allow long-lived connections, otherwise nginx holds the bytes and
    # realtime breaks. Matched before the generic location below.
    location ~ ^/api/(tasks/[^/]+/offers/stream|chats/[^/]+/stream)$ {
        proxy_pass              http://127.0.0.1:3000;
        proxy_http_version      1.1;
        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_buffering         off;
        proxy_cache             off;
        proxy_read_timeout      3600s;
        chunked_transfer_encoding off;
    }

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
