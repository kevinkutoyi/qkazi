services:
  postgres:
    image: postgres:16-alpine
    container_name: qkazi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: qkazi
      POSTGRES_PASSWORD: qkazi
      POSTGRES_DB: qkazi
    ports:
      - "5432:5432"
    volumes:
      - qkazi_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qkazi -d qkazi"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  qkazi_pgdata:
