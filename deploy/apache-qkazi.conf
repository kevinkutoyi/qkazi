# Qkazi Apache reverse proxy (for servers where Apache already owns :80/:443).
#
#   sudo a2enmod proxy proxy_http headers
#   sudo cp deploy/apache-qkazi.conf /etc/apache2/sites-available/qkazi.conf
#   sudo sed -i 's/qkazi.example.com/YOURDOMAIN/' /etc/apache2/sites-available/qkazi.conf
#   sudo a2ensite qkazi
#   sudo apache2ctl configtest && sudo systemctl reload apache2
#   sudo certbot --apache -d YOURDOMAIN     # adds the 443 vhost + redirect
#
# Replace qkazi.example.com with your domain. The app must already be running
# on 127.0.0.1:3000 (PM2). certbot copies these proxy rules into the generated
# *-le-ssl.conf, so HTTPS keeps proxying correctly.

<VirtualHost *:80>
    ServerName qkazi.example.com

    # Profile photos / ID docs / task images are capped at 5 MB in the app;
    # give the proxy a little headroom (10 MB).
    LimitRequestBody 10485760

    ProxyRequests Off
    ProxyPreserveHost On
    ProxyTimeout 3600

    # The app sets Secure cookies in production; tell it the real scheme.
    RequestHeader set X-Forwarded-Proto "https"

    # Server-Sent Events (live offers + chat). flushpackets=on streams bytes as
    # they arrive instead of buffering; no-gzip stops mod_deflate from holding
    # the stream. Matched BEFORE the catch-all ProxyPass below.
    ProxyPassMatch "^/api/(tasks/[^/]+/offers/stream|chats/[^/]+/stream)$" "http://127.0.0.1:3000" flushpackets=on
    SetEnvIf Request_URI "/stream$" no-gzip=1

    # Everything else.
    ProxyPass        / "http://127.0.0.1:3000/"
    ProxyPassReverse / "http://127.0.0.1:3000/"
</VirtualHost>
